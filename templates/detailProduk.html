<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropiSkin - Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #FBF5E9; 
            color: #1E3A8A; 
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            box-shadow: 0 12px 35px rgba(125, 211, 252, 0.35), 0 4px 10px rgba(125, 211, 252, 0.2);
            border: 1px solid rgba(219, 234, 254, 0.6);
        }

        .btn-primary { background: linear-gradient(90deg, #8CD6FC 0%, #63C5F8 100%); box-shadow: 0 4px 15px rgba(99, 197, 248, 0.4); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 197, 248, 0.6); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col justify-center items-center relative">

    <button onclick="window.location.href='{{ url_for('rekomendasi') }}'" class="absolute top-8 left-8 md:top-10 md:left-10 text-blue-900 text-3xl md:text-4xl hover:text-blue-700 transition-colors">
        <i class="fa-solid fa-circle-left"></i>
    </button>
    <button onclick="window.location.href='{{ url_for('home') }}'" class="absolute top-8 right-8 md:top-10 md:right-10 w-12 h-12 md:w-14 md:h-14 bg-white rounded-full shadow-md shadow-blue-200/50 flex items-center justify-center text-blue-600 text-xl hover:bg-blue-50 transition border border-gray-100">
        <i class="fa-solid fa-house"></i>
    </button>

    <h2 class="absolute top-8 md:top-10 left-1/2 -translate-x-1/2 text-3xl md:text-4xl font-bold text-center text-blue-900">Detail <span class="text-blue-500">Produk</span></h2>

    <div id="detail-loading" class="text-center text-blue-400 font-medium">Memuat detail produk...</div>

    <div id="detail-content" class="hidden w-[90vw] max-w-4xl h-[65vh] md:h-[60vh] flex flex-col md:flex-row gap-6 items-stretch justify-center">

        <div class="w-full md:w-2/5 h-full flex justify-center">
            <div class="w-full h-full bg-white rounded-3xl shadow-xl shadow-blue-300/50 flex items-center justify-center p-6 border border-blue-100">
                <img id="detail-image" src="{{ url_for('static', filename='images/sunscreen.png') }}" class="max-h-full max-w-full object-contain drop-shadow-md" alt="Product">
            </div>
        </div>

        <div class="w-full md:w-3/5 h-full card-glass p-6 md:p-8 flex flex-col items-center justify-between overflow-y-auto">
            
            <h3 class="font-bold text-2xl text-blue-900 mb-8 text-center w-full leading-tight" id="detail-name">-</h3>

            <div class="flex justify-center gap-3 w-full mb-4 shrink-0">
                <div class="bg-blue-50 text-blue-700 px-3 py-2.5 rounded-xl font-bold text-center flex-1 shadow-md shadow-blue-200/50 border border-blue-100 text-xs md:text-sm" id="detail-texture">-</div>
                <div class="bg-yellow-50 text-yellow-700 px-3 py-2.5 rounded-xl font-bold text-center flex-1 shadow-md shadow-yellow-200/50 border border-yellow-100 text-xs md:text-sm" id="detail-spf">-</div>
                <div class="bg-green-50 text-green-700 px-3 py-2.5 rounded-xl font-bold text-center flex-1 shadow-md shadow-green-200/50 border border-green-100 text-xs md:text-sm" id="detail-price">-</div>
            </div>

            <p class="text-gray-600 mb-6 leading-relaxed text-center text-sm flex-grow flex items-center" id="detail-desc">-</p>

            <a id="detail-buy-link" href="#" target="_blank" rel="noopener" class="btn-primary w-3/4 md:w-2/3 py-3 rounded-full font-bold text-base md:text-lg text-blue-900 shadow-md text-center mt-auto shrink-0">
                Beli Sekarang <i class="fa-solid fa-cart-shopping ml-2"></i>
            </a>
            
        </div>
    </div>

    <script>
        async function loadDetailProduk() {
            const idProduk = localStorage.getItem('tropiskin_productId');

            if (!idProduk) {
                alert("Produk tidak ditemukan!");
                window.location.href = "{{ url_for('rekomendasi') }}";
                return;
            }

            let response, produk;
            try {
                response = await fetch(`/produk/${idProduk}`);
            } catch (err) {
                alert("Gagal terhubung ke server. Periksa koneksi internet Anda.");
                return;
            }

            if (!response.ok) {
                alert("Produk tidak ditemukan!");
                window.location.href = "{{ url_for('rekomendasi') }}";
                return;
            }

            produk = await response.json();

            document.getElementById('detail-image').src = produk.Gambar;
            document.getElementById('detail-name').innerText = produk.Nama;
            document.getElementById('detail-texture').innerText = produk.Tekstur;
            document.getElementById('detail-spf').innerText = produk.SPF;
            document.getElementById('detail-price').innerText = produk.Harga;
            document.getElementById('detail-desc').innerText = produk.Deskripsi;
            document.getElementById('detail-buy-link').href = produk.URL;

            document.getElementById('detail-loading').classList.add('hidden');
            document.getElementById('detail-content').classList.remove('hidden');
            // Menghapus class hidden khusus flex agar tampil sejajar
            document.getElementById('detail-content').classList.add('flex');
        }

        loadDetailProduk();
    </script>
</body>
</html>
