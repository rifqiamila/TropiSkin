<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropiSkin - Form Analisis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FBF5E9;
            color: #1E3A8A;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        .bg-cream {
            background-color: #FBF5E9;
        }

        .custom-select {
            appearance: none;
            background-image: url('{{ url_for("static", filename="images/chevron-down.svg") }}');
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1rem;
        }

        .optional-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            color: #83d1e3;
            background: #e8f8fb;
            border-radius: 999px;
            padding: 2px 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="w-full min-h-screen flex">

        <div class="hidden md:block w-1/3 max-w-[400px] flex-shrink-0 h-screen sticky top-0">
            <img src="{{ url_for('static', filename='images/formAnalisis.png') }}" alt="Shell Decor" class="h-full w-full object-cover object-left mix-blend-multiply pointer-events-none">
        </div>

        <div class="flex-1 flex flex-col items-center justify-center px-6 md:px-12 py-8">

            <h2 class="text-3xl md:text-4xl font-bold text-center mb-6 text-blue-900">Form <span class="text-blue-500">Analisis</span></h2>

            <div class="p-6 md:p-10 w-full max-w-3xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] bg-cover bg-center relative"
                 style="background-image: url('{{ url_for('static', filename='images/boxForm.png') }}')">

                <form id="analysis-form" class="space-y-4 relative z-10">
                    <div id="main-fields" class="space-y-4"></div>
                    <div id="location-field"></div>
                    <div id="fitzpatrick-field"></div>
                </form>

                <div class="mt-8 flex justify-center relative z-10">
                    <img src="{{ url_for('static', filename='images/submit.png') }}" alt="Submit Form" id="btn-submit" class="h-10 md:h-12 cursor-pointer hover:scale-105 hover:drop-shadow-lg transition-all duration-300">
                </div>

            </div>
        </div>
    </div>

    <script>
        const mainFeatures = {
            "Jenis_Kulit": {
                label: "Jenis Kulit",
                options: [
                    { value: "Normal", text: "Normal", desc: "kulit terasa seimbang, tidak terlalu berminyak atau kering" },
                    { value: "Kering", text: "Kering", desc: "kulit sering terasa kencang, kusam, atau mengelupas" },
                    { value: "Berminyak", text: "Berminyak", desc: "kulit sering mengkilap, pori-pori terlihat besar" },
                    { value: "Kombinasi", text: "Kombinasi", desc: "berminyak di T-zone, normal/kering di pipi" }
                ]
            },
            "Kondisi_Kulit": {
                label: "Kondisi Kulit",
                options: [
                    { value: "Tidak ada", text: "Tidak ada", desc: "tidak ada masalah khusus, kulit relatif stabil" },
                    { value: "Berjerawat", text: "Berjerawat", desc: "mudah berjerawat, sering muncul di wajah" },
                    { value: "Sensitif", text: "Sensitif", desc: "mudah iritasi, merah, gatal, atau bereaksi terhadap produk" }
                ]
            },
            "Paparan_Matahari": {
                label: "Paparan Matahari",
                options: [
                    { value: "Rendah", text: "Rendah", desc: "kebanyakan di dalam ruangan, < 30 menit per hari" },
                    { value: "Sedang", text: "Sedang", desc: "sesekali di luar ruangan, 30 menit - 2 jam per hari" },
                    { value: "Tinggi", text: "Tinggi", desc: "sering terpapar matahari langsung, > 2 jam per hari" }
                ]
            },
            "Kelembapan": {
                label: "Kelembapan",
                options: [
                    { value: "Kering", text: "Kering", desc: "udara gersang, jarang hujan, tidak mudah berkeringat" },
                    { value: "Sedang", text: "Sedang", desc: "cuaca cukup nyaman, tidak terlalu lembap maupun kering" },
                    { value: "Lembap", text: "Lembap", desc: "udara pengap, mudah berkeringat, sering hujan" }
                ]
            },
            "Budget": {
                label: "Budget Sunscreen",
                options: [
                    { value: "Under 50K", text: "Di bawah Rp50.000", desc: "" },
                    { value: "50K-150K", text: "Rp50.000 - Rp150.000", desc: "" },
                    { value: "Above 150K", text: "Di atas Rp150.000", desc: "" },
                    { value: "Semua", text: "Belum pernah beli", desc: "tidak ada preferensi harga tertentu" }
                ]
            }
        };

        const provinsiList = [
            "Aceh", "Sumatera Utara", "Sumatera Barat", "Riau", "Kepulauan Riau",
            "Jambi", "Sumatera Selatan", "Bengkulu", "Lampung", "Bangka Belitung",
            "DKI Jakarta", "Jawa Barat", "Jawa Tengah", "DI Yogyakarta", "Jawa Timur",
            "Banten", "Bali", "Nusa Tenggara Barat", "Nusa Tenggara Timur",
            "Kalimantan Barat", "Kalimantan Tengah", "Kalimantan Selatan", "Kalimantan Timur", "Kalimantan Utara",
            "Sulawesi Utara", "Sulawesi Tengah", "Sulawesi Selatan", "Sulawesi Tenggara", "Gorontalo", "Sulawesi Barat",
            "Maluku", "Maluku Utara", "Papua", "Papua Barat", "Papua Tengah", "Papua Pegunungan", "Papua Selatan", "Papua Barat Daya"
        ];

        const fitzpatrickOptions = [
            { value: "Fair", text: "Fair (I–II)", desc: "sangat putih / cerah" },
            { value: "Medium", text: "Medium (III–IV)", desc: "putih kekuningan - cokelat muda" },
            { value: "Dark", text: "Dark (V–VI)", desc: "cokelat gelap - hitam" }
        ];

        function buildSelect(id, options, placeholder, required) {
            const opts = options.map(o => {
                const label = o.desc ? `${o.text} — ${o.desc}` : o.text;
                return `<option value="${o.value}">${label}</option>`;
            }).join('');
            
            return `
                <select id="${id}" ${required ? 'required' : ''}
                    class="custom-select w-full bg-[#FFFDF9] text-[#1E3A8A] rounded-xl py-3 px-5 focus:ring-2 focus:ring-blue-400 outline-none font-bold border border-blue-100 shadow-md shadow-blue-300/50 transition hover:shadow-lg hover:shadow-blue-400/50 text-sm cursor-pointer">
                    <option value="" ${required ? 'disabled' : ''} selected>${placeholder}</option>
                    ${opts}
                </select>
            `;
        }

        const mainFieldsContainer = document.getElementById('main-fields');
        Object.keys(mainFeatures).forEach(key => {
            const f = mainFeatures[key];
            const wrapper = document.createElement('div');
            wrapper.innerHTML = buildSelect(key, f.options, f.label, true);
            mainFieldsContainer.appendChild(wrapper);
        });

        document.getElementById('location-field').innerHTML =
            buildSelect('Lokasi', provinsiList.map(p => ({ value: p, text: p, desc: '' })), "Lokasi", true);

        document.getElementById('fitzpatrick-field').innerHTML =
            buildSelect('Fitzpatrick', fitzpatrickOptions, "Tipe Kulit Fitzpatrick (Opsional)", false);

        function submitForm() {
            const mainData = {};
            let isComplete = true;

            Object.keys(mainFeatures).forEach(k => {
                const val = document.getElementById(k).value;
                if (!val) isComplete = false;
                mainData[k] = val;
            });

            const lokasi = document.getElementById('Lokasi').value;
            if (!lokasi) isComplete = false;

            if (!isComplete) {
                alert("Mohon lengkapi semua pilihan yang wajib diisi!");
                return;
            }

            const fitzpatrickVal = document.getElementById('Fitzpatrick').value || "Medium";

            localStorage.setItem('tropiskin_main_features', JSON.stringify(mainData));

            localStorage.setItem('tropiskin_extra_info', JSON.stringify({
                Lokasi: lokasi,
                Fitzpatrick: fitzpatrickVal
            }));

            window.location.href = "{{ url_for('loading') }}";
        }

        document.getElementById('btn-submit').addEventListener('click', submitForm);
    </script>
</body>
</html>
