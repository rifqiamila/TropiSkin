<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropiSkin - Rekomendasi Sunscreen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: #FBF5E9; color: #1E3A8A; }
    </style>
</head>
<body class="p-12 min-h-screen flex flex-col">
    <h2 class="text-4xl font-bold text-center mb-16 text-blue-900">Rekomendasi <span class="text-blue-500">Sunscreen</span></h2>
    
    <div class="flex flex-wrap gap-8 justify-center items-center" id="product-list"></div>
    
    <div class="mt-16 text-center pb-10">
        <button onclick="window.location.href='hasilAnalisis.html'" class="text-blue-400 font-bold hover:underline">
            <i class="fa-solid fa-arrow-left mr-2"></i> Kembali ke Hasil
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: "Azarine Hydrasoothe Sunscreen Gel", texture: "Gel", price: "Rp 65.000", image: "https://down-id.img.susercontent.com/file/5a563914a87a2a536968ce63d70b55cc" },
            { id: 2, name: "Skin Aqua UV Moisture Gel", texture: "Gel", price: "Rp 55.000", image: "https://www.rohto.co.id/images/products/skinaqua/uv-moisture-gel.png" },
            { id: 3, name: "Wardah UV Shield Aqua Fresh", texture: "Lotion", price: "Rp 45.000", image: "https://www.wardahbeauty.com/uploads/product/2021/04/1618210340-uv-shield-aqua-fresh-essence.jpg" }
        ];

        const container = document.getElementById('product-list');
        container.innerHTML = products.map(p => `
            <div onclick="goToDetail(${p.id})" class="bg-white rounded-3xl p-6 w-64 h-[350px] shadow-lg hover:shadow-xl transition-all cursor-pointer flex flex-col items-center group border border-gray-100">
                <div class="flex-grow flex items-center justify-center p-2 w-full h-40">
                    <img src="${p.image}" class="max-h-full object-contain group-hover:scale-105 transition duration-300">
                </div>
                <p class="text-center font-bold text-blue-900 text-base leading-tight mt-4 h-12">${p.name}</p>
                <p class="text-blue-500 font-semibold text-sm mt-2">${p.texture} • ${p.price}</p>
            </div>
        `).join('');

        function goToDetail(id) {
            localStorage.setItem('tropiskin_productId', id);
            window.location.href = 'detailProduk.html';
        }
    </script>
</body>
</html>
