<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropiSkin - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,500&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #FBF5E9; 
            overflow-x: hidden; 
        }
        
        .font-serif-italic { 
            font-family: 'Playfair Display', serif; 
        }
        
        .btn-water {
            background: linear-gradient(90deg, #b0e5eb 0%, #83d1e3 100%);
            box-shadow: 0 8px 20px rgba(131, 209, 227, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        .btn-water:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(131, 209, 227, 0.6), inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="w-full h-screen flex flex-col md:flex-row">
        
        <div class="w-full md:w-[40%] h-[40vh] md:h-screen flex-shrink-0 relative">
            <img src="images/index.png" alt="TropiSkin Sunscreen" class="w-full h-full object-cover object-center absolute inset-0">
        </div>
        
        <div class="w-full md:w-[60%] h-full flex flex-col justify-center items-center text-center px-8 md:px-24 bg-[#FBF5E9]">
            
            <h1 class="text-[3.5rem] md:text-[4rem] font-extrabold mb-2 leading-tight tracking-tight drop-shadow-sm">
                <span class="text-5xl font-bold text-center mb-8 text-blue-900">Tropi<span class="text-blue-500">Skin</span>
            </h1>
            
            <p class="text-xl md:text-2xl font-serif-italic text-gray-900 mb-10 tracking-wide">
                Smart Sunscreen Recommendation for Tropical Skin
            </p>
            
            <p class="text-[15px] md:text-base text-gray-700 max-w-lg mb-12 leading-relaxed px-4">
                Get personalized sunscreen recommendations tailored to your skin type, sun exposure, humidity level, and budget powered by Artificial Intelligence.
            </p>
            
            <div class="flex flex-wrap justify-center gap-4 md:gap-6 mb-16">
                <img src="images/index1.png" alt="Personalized for You" class="w-20 h-20 md:w-[100px] md:h-[100px] object-contain hover:scale-105 transition-transform duration-300 drop-shadow-sm">
                <img src="images/index2.png" alt="Designed for Tropical Climate" class="w-20 h-20 md:w-[100px] md:h-[100px] object-contain hover:scale-105 transition-transform duration-300 drop-shadow-sm">
                <img src="images/index3.png" alt="Smart and Evidence-based" class="w-20 h-20 md:w-[100px] md:h-[100px] object-contain hover:scale-105 transition-transform duration-300 drop-shadow-sm">
                <img src="images/index4.png" alt="Find Your Best Sunscreen" class="w-20 h-20 md:w-[100px] md:h-[100px] object-contain hover:scale-105 transition-transform duration-300 drop-shadow-sm">
            </div>

            <button onclick="window.location.href='formAnalisis.html'" class="btn-water py-4 px-20 rounded-full shadow-lg border border-white/50 relative overflow-hidden group">
                <span class="relative z-10 tracking-wide font-extrabold text-xl text-[#0d3446]">Mulai Analisis</span>
            </button>
            
        </div>
        
    </div>
</body>
</html>
